# ═══════════════════════════════════════════════════════════════════
#  PgBouncer Configuration — Waha Health Care
# ═══════════════════════════════════════════════════════════════════
#
# الموقع: /etc/pgbouncer/pgbouncer.ini
#
# PgBouncer هو Connection Pooler لـ PostgreSQL.
# يسمح لـ 200 طلب متزامن من التطبيق بالعمل فقط على 20 اتصالاً حقيقياً بالـ DB.
# هذا يحمي PostgreSQL من الإرهاق عند الضغط العالي.
#
# التثبيت:
#   sudo apt-get install pgbouncer
#   sudo cp pgbouncer.ini /etc/pgbouncer/pgbouncer.ini
#   sudo systemctl restart pgbouncer
# ═══════════════════════════════════════════════════════════════════

[databases]
# استبدل القيم التالية ببيانات قاعدة بياناتك
wahadb = host=localhost port=5432 dbname=wahadb

[pgbouncer]
# ─── الاستماع ─────────────────────────────────────────────────────
listen_addr = 127.0.0.1
listen_port = 5433         # التطبيق يتصل بهذا المنفذ بدلاً من 5432

# ─── نمط التجميع ──────────────────────────────────────────────────
# transaction: كل transaction تحصل على اتصال من المجمع (مثالي لـ Next.js)
# session: كل جلسة تحتفظ باتصالها (أبطأ، تجنب)
pool_mode = transaction

# ─── حجم المجمع ───────────────────────────────────────────────────
# أقصى اتصالات حقيقية بـ PostgreSQL (لا تتجاوز max_connections في postgres.conf)
max_db_connections = 25

# أقصى اتصالات عميل يمكن لـ PgBouncer قبولها من التطبيق
max_client_conn = 500

# الحجم الافتراضي لكل مجمع
default_pool_size = 25

# اتصالات احتياطية إضافية (10% من pool_size)
reserve_pool_size = 5
reserve_pool_timeout = 3

# ─── المصادقة ─────────────────────────────────────────────────────
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# ─── الصحة والمراقبة ──────────────────────────────────────────────
# منفذ المراقبة (للإدارة)
# psql -p 5433 -U pgbouncer pgbouncer -c "SHOW STATS;"
admin_users = pgbouncer

# ─── معاملات أداء ─────────────────────────────────────────────────
server_lifetime = 3600        # إغلاق اتصال بعد ساعة من الخمول
server_idle_timeout = 600     # إغلاق اتصال خامل بعد 10 دقائق
client_idle_timeout = 600     # قطع العميل الخامل بعد 10 دقائق
server_connect_timeout = 10   # مهلة الاتصال بـ PostgreSQL
query_timeout = 120           # مهلة أقصى للـ query الواحد (ثانية)
