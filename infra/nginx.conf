# ═══════════════════════════════════════════════════════════════════
#  Nginx Load Balancer Configuration — Waha Health Care
# ═══════════════════════════════════════════════════════════════════
#
# الموقع: /etc/nginx/sites-available/waha-health-care
#
# التفعيل:
#   sudo ln -s /etc/nginx/sites-available/waha-health-care \
#              /etc/nginx/sites-enabled/waha-health-care
#   sudo nginx -t && sudo systemctl reload nginx
#
# هذا الملف يعمل مع شهادة SSL من Let's Encrypt (certbot)
# فعّل SSL بـ: sudo certbot --nginx -d yourdomain.com
# ═══════════════════════════════════════════════════════════════════

# ── 1. Upstream: نسختا Next.js المتوازيتان ──────────────────────────
upstream nextjs_cluster {
    # خوارزمية التوزيع: least_conn (يُرسل للخادم الأقل ضغطاً)
    # أفضل من round_robin لأن طلبات الخصم المعقدة تستغرق أوقاتاً مختلفة
    least_conn;

    server 127.0.0.1:3000 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:3001 weight=1 max_fails=3 fail_timeout=30s;

    # keepalive: إعادة استخدام الاتصالات بدلاً من إنشاء اتصال جديد لكل طلب
    keepalive 32;
}

# ── 2. إعادة توجيه HTTP → HTTPS ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # ACME challenge لـ certbot (لا تحذفه)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # كل الطلبات الأخرى → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── 3. الخادم الرئيسي (HTTPS) ────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ─── شهادة SSL (يُضاف بواسطة certbot تلقائياً) ───
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ─── ضغط المحتوى (Gzip) ───────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/x-font-ttf font/woff font/woff2
        image/svg+xml;

    # ─── حدود الطلبات ─────────────────────────────────────────
    client_max_body_size 15M;     # حجم أقصى للملفات (Excel imports)
    client_body_timeout 60s;
    client_header_timeout 15s;

    # ─── حماية أساسية ──────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"          always;
    add_header X-XSS-Protection       "1; mode=block"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ─── الملفات الثابتة (Static Assets) — Cache أقصى مدة ────
    location /_next/static/ {
        proxy_pass http://nextjs_cluster;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /favicon.ico {
        proxy_pass http://nextjs_cluster;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    location ~ ^/(logo|icons|manifest)\.(.+)$ {
        proxy_pass http://nextjs_cluster;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # ─── SSE Endpoint (إشعارات فورية) ─── بدون timeout ─────────
    location /api/notifications/stream {
        proxy_pass http://nextjs_cluster;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE يحتاج اتصالاً مفتوحاً طويل الأمد
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_buffering       off;
        proxy_cache           off;
        proxy_cache_bypass    1;
    }

    # ─── API الصحة (Health Check) ——لا نُسجّل في السجلات ──────
    location /api/health {
        proxy_pass http://nextjs_cluster;
        access_log off;
    }

    # ─── جميع الطلبات الأخرى ─────────────────────────────────
    location / {
        proxy_pass http://nextjs_cluster;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # مهلة المعالجة — طلبات الاستيراد قد تأخذ وقتاً أطول
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;

        # تعطيل الـ buffering لـ Server Actions (Next.js streaming)
        proxy_buffering off;
    }
}
