services:
  redis:
    image: redis:7-alpine
    container_name: wahda_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - waadapp_tba_network

  app:
    image: ${APP_IMAGE:-wahda_web:latest}
    container_name: wahda_app
    restart: always
    env_file:
      - .env.production
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/api/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    ports:
      - "${APP_HOST_PORT:-3101}:3000"
    networks:
      - waadapp_tba_network

volumes:
  redis_data:

networks:
  waadapp_tba_network:
    external: true
