name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint and typecheck
        run: npm run lint

      - name: Build Next.js
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          # Add placeholder env vars for next build that are required in src/lib/env.ts
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/placeholder"
          JWT_SECRET: "placeholder-jwt-secret-min-64-characters-long-xxxxxxxxxxxxxxxxx"
          BACKUP_ENCRYPTION_KEY: "placeholder-backup-key-min-64-chars-xxxxxxxxxxxxxxxxxxxxxx"
          BENEFICIARY_TOKEN_SECRET: "placeholder-beneficiary-token-secret-xxxxxxxxxxxxxxxxxx"
          BENEFICIARY_JWT_SECRET: "placeholder-beneficiary-jwt-secret-xxxxxxxxxxxxxxxxxxx"
